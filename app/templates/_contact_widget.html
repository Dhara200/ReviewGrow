{% set widget_phone = contact_phone|default('8778358580', true) %}
{% set widget_whatsapp = whatsapp_number|default('18778358580', true) %}
<div class="rs-contact-widget" data-contact-widget>
    <div class="rs-contact-options" data-contact-options aria-hidden="true">
        <a class="rs-contact-button rs-contact-call" href="tel:{{ widget_phone }}" aria-label="Call us" title="Call us">
            <i class="bi bi-telephone-fill" aria-hidden="true"></i>
        </a>
        <a class="rs-contact-button rs-contact-whatsapp" href="https://wa.me/{{ widget_whatsapp }}" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp" title="Chat on WhatsApp">
            <i class="bi bi-whatsapp" aria-hidden="true"></i>
        </a>
        <button class="rs-contact-button rs-contact-close" type="button" data-contact-close aria-label="Close contact options" title="Close contact options">
            <i class="bi bi-x-lg" aria-hidden="true"></i>
        </button>
    </div>
    <button class="rs-contact-button rs-contact-toggle" type="button" data-contact-toggle aria-label="Contact us" title="Contact us" aria-expanded="false">
        <i class="bi bi-chat-dots-fill" aria-hidden="true"></i>
    </button>
</div>
