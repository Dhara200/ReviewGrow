name: Deploy to EC2 via ECR

on:
  push:
    branches:
      - main

concurrency:
  group: reviewgrow-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: reviewgrow-app-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -Eeuo pipefail

          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"

          docker build \
            --file docker/app/Dockerfile \
            --tag "${IMAGE_URI}:${IMAGE_TAG}" \
            --tag "${IMAGE_URI}:latest" \
            .

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"

      - name: Copy production Compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: ${{ secrets.EC2_DEPLOY_PATH }}
          overwrite: true

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,EC2_DEPLOY_PATH
          script: |
            set -Eeuo pipefail

            cd "$EC2_DEPLOY_PATH"

            test -f .env || {
              echo "ERROR: .env does not exist"
              exit 1
            }

            test -f docker-compose.prod.yml || {
              echo "ERROR: docker-compose.prod.yml does not exist"
              exit 1
            }

            mkdir -p uploads

            ECR_IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"

            printf '%s\n' \
              "ECR_IMAGE_URI=${ECR_IMAGE_URI}" \
              "IMAGE_TAG=${IMAGE_TAG}" \
              > .deploy.env

            chmod 600 .deploy.env

            aws ecr get-login-password \
              --region "$AWS_REGION" \
            | sudo docker login \
                --username AWS \
                --password-stdin \
                "$ECR_REGISTRY"

            sudo docker compose \
              --env-file .deploy.env \
              --file docker-compose.yml \
              config

            sudo docker compose \
              --env-file .deploy.env \
              --file docker-compose.yml \
              pull app worker

            sudo docker compose \
              --env-file .deploy.env \
              --file docker-compose.yml \
              up -d \
              --no-build \
              --force-recreate \
              --remove-orphans \
              mysql app worker

            for attempt in $(seq 1 18); do
              if curl \
                --fail \
                --silent \
                http://127.0.0.1:5000/health \
                >/dev/null; then
                echo "Health check passed"
                break
              fi

              if [ "$attempt" -eq 18 ]; then
                echo "ERROR: Health check failed"

                sudo docker compose \
                  --env-file .deploy.env \
                  --file docker-compose.yml \
                  ps

                sudo docker compose \
                  --env-file .deploy.env \
                  --file docker-compose.yml \
                  logs --tail=200 app worker

                exit 1
              fi

              sleep 5
            done

            EXPECTED_IMAGE="${ECR_IMAGE_URI}:${IMAGE_TAG}"

            APP_IMAGE="$(
              sudo docker inspect \
                --format '{{.Config.Image}}' \
                reputation_app
            )"

            WORKER_IMAGE="$(
              sudo docker inspect \
                --format '{{.Config.Image}}' \
                reputation_worker
            )"

            echo "Expected image: ${EXPECTED_IMAGE}"
            echo "App image: ${APP_IMAGE}"
            echo "Worker image: ${WORKER_IMAGE}"

            test "$APP_IMAGE" = "$EXPECTED_IMAGE"
            test "$WORKER_IMAGE" = "$EXPECTED_IMAGE"

            sudo docker compose \
              --env-file .deploy.env \
              --file docker-compose.yml \
              ps

            sudo docker image prune -f

            echo "Deployment successful: ${IMAGE_TAG}"
