name: Deploy to EC2 via ECR

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: reviewgrow-app-app
      IMAGE_TAG: ${{ github.sha }}
      EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail

          docker build \
            -f docker/app/Dockerfile \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            .

          docker tag \
            "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail

          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.0.1
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: reputation-app
          IMAGE_TAG: ${{ github.sha }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,EC2_DEPLOY_PATH
          script: |
            set -euo pipefail

            IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

            mkdir -p "$EC2_DEPLOY_PATH/uploads"
            cd "$EC2_DEPLOY_PATH"

            test -f .env || {
              echo "ERROR: $EC2_DEPLOY_PATH/.env does not exist"
              exit 1
            }

            aws ecr get-login-password \
              --region "$AWS_REGION" |
              docker login \
                --username AWS \
                --password-stdin "$ECR_REGISTRY"

            docker pull "$IMAGE"

            docker rm -f reputation_app reputation_worker 2>/dev/null || true

            docker run -d \
              --name reputation_app \
              --restart unless-stopped \
              -p 5000:5000 \
              --env-file "$EC2_DEPLOY_PATH/.env" \
              -v "$EC2_DEPLOY_PATH/uploads:/app/uploads" \
              "$IMAGE" \
              gunicorn \
                --workers 2 \
                --bind 0.0.0.0:5000 \
                --timeout 120 \
                app.app:app

            docker run -d \
              --name reputation_worker \
              --restart unless-stopped \
              --env-file "$EC2_DEPLOY_PATH/.env" \
              -v "$EC2_DEPLOY_PATH/uploads:/app/uploads" \
              "$IMAGE" \
              python worker.py

            sleep 10

            if ! docker ps --format '{{.Names}}' | grep -qx reputation_app; then
              echo "ERROR: App container failed to start"
              docker logs --tail=200 reputation_app || true
              exit 1
            fi

            if ! docker ps --format '{{.Names}}' | grep -qx reputation_worker; then
              echo "ERROR: Worker container failed to start"
              docker logs --tail=200 reputation_worker || true
              exit 1
            fi

            curl --fail --silent --show-error \
              http://127.0.0.1:5000/health || {
                echo "ERROR: Application health check failed"
                docker logs --tail=200 reputation_app || true
                exit 1
              }

            docker image prune -f

