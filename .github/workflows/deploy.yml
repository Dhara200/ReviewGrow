name: Deploy to EC2 via ECR

on:
push:
branches:
- main

concurrency:
group: reviewgrow-production
cancel-in-progress: false

permissions:
contents: read

env:
AWS_REGION: ${{ secrets.AWS_REGION }}
ECR_REPOSITORY: reviewgrow-app-app
IMAGE_TAG: ${{ github.sha }}

jobs:
build-and-deploy:
name: Build, Push and Deploy
runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Login to Amazon ECR
    id: login-ecr
    uses: aws-actions/amazon-ecr-login@v2

  - name: Build Docker image
    env:
      ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
    run: |
      set -Eeuo pipefail

      IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"

      echo "Building ${IMAGE_URI}:${IMAGE_TAG}"

      docker build \
        --file docker/app/Dockerfile \
        --tag "${IMAGE_URI}:${IMAGE_TAG}" \
        --tag "${IMAGE_URI}:latest" \
        .

  - name: Push Docker image to ECR
    env:
      ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
    run: |
      set -Eeuo pipefail

      IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"

      docker push "${IMAGE_URI}:${IMAGE_TAG}"
      docker push "${IMAGE_URI}:latest"

  - name: Copy production Compose file to EC2
    uses: appleboy/scp-action@v0.1.7
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USER }}
      key: ${{ secrets.EC2_PRIVATE_KEY }}
      source: docker-compose.prod.yml
      target: ${{ secrets.EC2_DEPLOY_PATH }}
      overwrite: true

  - name: Deploy SHA image to EC2
    uses: appleboy/ssh-action@v1.0.3
    env:
      AWS_REGION: ${{ env.AWS_REGION }}
      ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
      IMAGE_TAG: ${{ env.IMAGE_TAG }}
      EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USER }}
      key: ${{ secrets.EC2_PRIVATE_KEY }}
      envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,EC2_DEPLOY_PATH
      script: |
        set -Eeuo pipefail

        echo "Starting deployment of commit ${IMAGE_TAG}"

        if [ -z "${EC2_DEPLOY_PATH:-}" ]; then
          echo "ERROR: EC2_DEPLOY_PATH is empty."
          exit 1
        fi

        mkdir -p "$EC2_DEPLOY_PATH"
        cd "$EC2_DEPLOY_PATH"

        if [ ! -f ".env" ]; then
          echo "ERROR: ${EC2_DEPLOY_PATH}/.env does not exist."
          exit 1
        fi

        if [ ! -f "docker-compose.prod.yml" ]; then
          echo "ERROR: docker-compose.prod.yml does not exist."
          exit 1
        fi

        mkdir -p uploads

        ECR_IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"

        printf '%s\n' \
          "ECR_IMAGE_URI=${ECR_IMAGE_URI}" \
          "IMAGE_TAG=${IMAGE_TAG}" \
          > .deploy.env

        chmod 600 .deploy.env

        echo "Deploying ${ECR_IMAGE_URI}:${IMAGE_TAG}"

        aws ecr get-login-password \
          --region "$AWS_REGION" \
        | sudo docker login \
            --username AWS \
            --password-stdin \
            "$ECR_REGISTRY"

        echo "Validating Docker Compose configuration..."

        sudo docker compose \
          --env-file .deploy.env \
          --file docker-compose.prod.yml \
          config >/dev/null

        echo "Pulling application and worker images..."

        sudo docker compose \
          --env-file .deploy.env \
          --file docker-compose.prod.yml \
          pull app worker

        echo "Starting containers..."

        sudo docker compose \
          --env-file .deploy.env \
          --file docker-compose.prod.yml \
          up -d \
          --no-build \
          --force-recreate \
          --remove-orphans \
          mysql app worker

        echo "Waiting for application health check..."

        HEALTH_CHECK_PASSED=false

        for attempt in $(seq 1 18); do
          if curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:5000/health \
            >/dev/null; then

            HEALTH_CHECK_PASSED=true
            echo "Application health check passed."
            break
          fi

          echo "Health check attempt ${attempt}/18 failed."
          sleep 5
        done

        if [ "$HEALTH_CHECK_PASSED" != "true" ]; then
          echo "ERROR: Application health check failed."

          echo "Container status:"
          sudo docker compose \
            --env-file .deploy.env \
            --file docker-compose.prod.yml \
            ps || true

          echo "Application logs:"
          sudo docker compose \
            --env-file .deploy.env \
            --file docker-compose.prod.yml \
            logs --tail=200 app || true

          echo "Worker logs:"
          sudo docker compose \
            --env-file .deploy.env \
            --file docker-compose.prod.yml \
            logs --tail=200 worker || true

          echo "MySQL logs:"
          sudo docker compose \
            --env-file .deploy.env \
            --file docker-compose.prod.yml \
            logs --tail=100 mysql || true

          exit 1
        fi

        APP_STATUS="$(
          sudo docker inspect \
            --format '{{.State.Status}}' \
            reputation_app 2>/dev/null || true
        )"

        WORKER_STATUS="$(
          sudo docker inspect \
            --format '{{.State.Status}}' \
            reputation_worker 2>/dev/null || true
        )"

        if [ "$APP_STATUS" != "running" ]; then
          echo "ERROR: Application container is not running."
          sudo docker logs --tail=200 reputation_app || true
          exit 1
        fi

        if [ "$WORKER_STATUS" != "running" ]; then
          echo "ERROR: Worker container is not running."
          sudo docker logs --tail=200 reputation_worker || true
          exit 1
        fi

        DEPLOYED_APP_IMAGE="$(
          sudo docker inspect \
            --format '{{.Config.Image}}' \
            reputation_app
        )"

        DEPLOYED_WORKER_IMAGE="$(
          sudo docker inspect \
            --format '{{.Config.Image}}' \
            reputation_worker
        )"

        EXPECTED_IMAGE="${ECR_IMAGE_URI}:${IMAGE_TAG}"

        echo "Expected image: ${EXPECTED_IMAGE}"
        echo "Application image: ${DEPLOYED_APP_IMAGE}"
        echo "Worker image: ${DEPLOYED_WORKER_IMAGE}"

        if [ "$DEPLOYED_APP_IMAGE" != "$EXPECTED_IMAGE" ]; then
          echo "ERROR: Application is running the wrong image."
          exit 1
        fi

        if [ "$DEPLOYED_WORKER_IMAGE" != "$EXPECTED_IMAGE" ]; then
          echo "ERROR: Worker is running the wrong image."
          exit 1
        fi

        echo "Final container status:"

        sudo docker compose \
          --env-file .deploy.env \
          --file docker-compose.prod.yml \
          ps

        sudo docker image prune -f

        echo "Deployment completed successfully."
        echo "Commit SHA: ${IMAGE_TAG}"

