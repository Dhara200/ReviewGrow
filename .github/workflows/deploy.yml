name: Deploy to EC2 via ECR

on:
  push:
    branches:
      - main

concurrency:
  group: reviewgrow-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: reviewgrow-app-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -Eeuo pipefail

          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"

          docker build \
            --file docker/app/Dockerfile \
            --tag "${IMAGE_URI}:${IMAGE_TAG}" \
            --tag "${IMAGE_URI}:latest" \
            .

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,EC2_DEPLOY_PATH

          script: |
            set -Eeuo pipefail

            cd "$EC2_DEPLOY_PATH"

            echo "Updating EC2 repository..."

            test -d .git || {
              echo "ERROR: $EC2_DEPLOY_PATH is not a Git repository"
              exit 1
            }

            git fetch origin main
            git reset --hard origin/main

            echo "EC2 repository updated:"
            git log -1 --oneline

            test -f .env || {
              echo "ERROR: .env does not exist"
              exit 1
            }

            test -f docker-compose.yml || {
              echo "ERROR: docker-compose.yml does not exist"
              exit 1
            }

            test -f scripts/run_migrations.sh || {
              echo "ERROR: scripts/run_migrations.sh does not exist"
              exit 1
            }

            test -d database/migrations || {
              echo "ERROR: database/migrations directory does not exist"
              exit 1
            }

            mkdir -p uploads

            ECR_IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"

            echo "Reading worker replica count..."

            WORKER_REPLICAS="$(
              sed -n \
                's/^[[:space:]]*WORKER_REPLICAS[[:space:]]*=[[:space:]]*\([0-9][0-9]*\)[[:space:]]*$/\1/p' \
                .env \
              | tail -n 1
            )"

            if [ -z "$WORKER_REPLICAS" ]; then
              echo "ERROR: WORKER_REPLICAS is missing or invalid in .env"
              echo "Expected example: WORKER_REPLICAS=1"
              exit 1
            fi

            if [ "$WORKER_REPLICAS" -lt 1 ]; then
              echo "ERROR: WORKER_REPLICAS must be at least 1"
              exit 1
            fi

            echo "Configured worker replicas: ${WORKER_REPLICAS}"

            cp .env .deploy.env

            {
              echo ""
              echo "ECR_IMAGE_URI=${ECR_IMAGE_URI}"
              echo "IMAGE_TAG=${IMAGE_TAG}"
            } >> .deploy.env

            chmod 600 .deploy.env

            echo "Logging in to Amazon ECR..."

            aws ecr get-login-password \
              --region "$AWS_REGION" \
            | sudo docker login \
                --username AWS \
                --password-stdin \
                "$ECR_REGISTRY"

            echo "Validating Docker Compose configuration..."

            sudo docker compose \
              --env-file .deploy.env \
              --file docker-compose.yml \
              config --quiet

            echo "Compose configuration validated"

            sudo docker compose \
              --env-file .deploy.env \
              --file docker-compose.yml \
              config --images

            echo "Pulling new app and worker images..."

            sudo docker compose \
              --env-file .deploy.env \
              --file docker-compose.yml \
              pull app worker

            echo "Starting MySQL..."

            sudo docker compose \
              --env-file .deploy.env \
              --file docker-compose.yml \
              up -d mysql

            echo "Waiting for MySQL container..."

            for attempt in $(seq 1 30); do
              MYSQL_STATUS="$(
                sudo docker inspect \
                  --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' \
                  reputation_mysql \
                  2>/dev/null || true
              )"

              if [ "$MYSQL_STATUS" = "healthy" ] || [ "$MYSQL_STATUS" = "running" ]; then
                if sudo docker exec reputation_mysql \
                  mysqladmin ping \
                  -uroot \
                  --password="$(
                    sudo docker exec reputation_mysql \
                      printenv MYSQL_ROOT_PASSWORD
                  )" \
                  --silent \
                  >/dev/null 2>&1; then
                  echo "MySQL is ready"
                  break
                fi
              fi

              if [ "$attempt" -eq 30 ]; then
                echo "ERROR: MySQL did not become ready"

                sudo docker compose \
                  --env-file .deploy.env \
                  --file docker-compose.yml \
                  ps

                sudo docker compose \
                  --env-file .deploy.env \
                  --file docker-compose.yml \
                  logs --tail=200 mysql

                exit 1
              fi

              echo "Waiting for MySQL... attempt ${attempt}/30"
              sleep 3
            done

            echo "Loading migration variables from MySQL container..."

            export MYSQL_DATABASE="$(
              sudo docker exec reputation_mysql \
                printenv MYSQL_DATABASE
            )"

            export MYSQL_USER="$(
              sudo docker exec reputation_mysql \
                printenv MYSQL_USER
            )"

            export MYSQL_PASSWORD="$(
              sudo docker exec reputation_mysql \
                printenv MYSQL_PASSWORD
            )"

            test -n "$MYSQL_DATABASE" || {
              echo "ERROR: MYSQL_DATABASE is empty"
              exit 1
            }

            test -n "$MYSQL_USER" || {
              echo "ERROR: MYSQL_USER is empty"
              exit 1
            }

            test -n "$MYSQL_PASSWORD" || {
              echo "ERROR: MYSQL_PASSWORD is empty"
              exit 1
            }

            export MYSQL_CONTAINER="reputation_mysql"
            export MIGRATIONS_DIR="database/migrations"

            echo "Running pending database migrations..."

            chmod +x scripts/run_migrations.sh
            ./scripts/run_migrations.sh

            echo "Database migrations completed"

            echo "Starting app and ${WORKER_REPLICAS} worker replica(s)..."

            sudo docker compose \
              --env-file .deploy.env \
              --file docker-compose.yml \
              up -d \
              --no-build \
              --force-recreate \
              --remove-orphans \
              --scale worker="$WORKER_REPLICAS" \
              app worker

            echo "Waiting for application health check..."

            for attempt in $(seq 1 18); do
              if curl \
                --fail \
                --silent \
                http://127.0.0.1:5000/health \
                >/dev/null; then
                echo "Health check passed"
                break
              fi

              if [ "$attempt" -eq 18 ]; then
                echo "ERROR: Health check failed"

                sudo docker compose \
                  --env-file .deploy.env \
                  --file docker-compose.yml \
                  ps

                sudo docker compose \
                  --env-file .deploy.env \
                  --file docker-compose.yml \
                  logs --tail=200 app worker

                exit 1
              fi

              echo "Waiting for application... attempt ${attempt}/18"
              sleep 5
            done

            EXPECTED_IMAGE="${ECR_IMAGE_URI}:${IMAGE_TAG}"

            APP_IMAGE="$(
              sudo docker inspect \
                --format '{{.Config.Image}}' \
                reputation_app
            )"

            echo "Expected image: ${EXPECTED_IMAGE}"
            echo "App image: ${APP_IMAGE}"

            test "$APP_IMAGE" = "$EXPECTED_IMAGE" || {
              echo "ERROR: App is not running expected image"
              exit 1
            }

            echo "Finding worker containers..."

            WORKER_CONTAINERS="$(
              sudo docker compose \
                --env-file .deploy.env \
                --file docker-compose.yml \
                ps -q worker
            )"

            test -n "$WORKER_CONTAINERS" || {
              echo "ERROR: No worker containers are running"
              exit 1
            }

            ACTUAL_WORKER_COUNT="$(
              printf '%s\n' "$WORKER_CONTAINERS" \
              | sed '/^[[:space:]]*$/d' \
              | wc -l \
              | tr -d '[:space:]'
            )"

            echo "Expected worker count: ${WORKER_REPLICAS}"
            echo "Actual worker count: ${ACTUAL_WORKER_COUNT}"

            test "$ACTUAL_WORKER_COUNT" -eq "$WORKER_REPLICAS" || {
              echo "ERROR: Worker replica count does not match"
              exit 1
            }

            for WORKER_CONTAINER in $WORKER_CONTAINERS; do
              WORKER_NAME="$(
                sudo docker inspect \
                  --format '{{.Name}}' \
                  "$WORKER_CONTAINER" \
                | sed 's#^/##'
              )"

              WORKER_IMAGE="$(
                sudo docker inspect \
                  --format '{{.Config.Image}}' \
                  "$WORKER_CONTAINER"
              )"

              WORKER_STATUS="$(
                sudo docker inspect \
                  --format '{{.State.Status}}' \
                  "$WORKER_CONTAINER"
              )"

              echo "Worker: ${WORKER_NAME}"
              echo "Worker status: ${WORKER_STATUS}"
              echo "Worker image: ${WORKER_IMAGE}"

              test "$WORKER_STATUS" = "running" || {
                echo "ERROR: Worker ${WORKER_NAME} is not running"
                exit 1
              }

              test "$WORKER_IMAGE" = "$EXPECTED_IMAGE" || {
                echo "ERROR: Worker ${WORKER_NAME} is not running expected image"
                exit 1
              }
            done

            sudo docker compose \
              --env-file .deploy.env \
              --file docker-compose.yml \
              ps

            sudo docker image prune -f

            rm -f .deploy.env

            echo "Deployment successful: ${IMAGE_TAG}"
            echo "Worker replicas running: ${WORKER_REPLICAS}"