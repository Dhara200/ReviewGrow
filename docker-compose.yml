services:

  mysql:
    image: mysql:8.0

    container_name: reputation_mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes: 
      - ./uploads:/app/uploads

    container_name: reputation_app

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5000:5000"

    depends_on:
      - mysql

  worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - ./uploads:/app/uploads

    container_name: reputation_worker

    restart: unless-stopped

    env_file:
      - .env

    command: ["python", "worker.py"]

    depends_on:
      - mysql

volumes:
  mysql_data:
