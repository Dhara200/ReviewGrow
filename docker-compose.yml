services:

  mysql:
    image: mysql:8.0
    container_name: reputation_mysql
    restart: unless-stopped

    # existing environment, volumes, healthcheck, etc.

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  app:
    image: ${ECR_REGISTRY:?ECR_REGISTRY is required}/reviewgrow-app-app:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: reputation_app
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads

    ports:
      - "5000:5000"

    depends_on:
      mysql:
        condition: service_healthy

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  worker:
    image: ${ECR_REGISTRY:?ECR_REGISTRY is required}/reviewgrow-app-app:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: reputation_worker
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads

    command: ["python", "worker.py"]

    depends_on:
      mysql:
        condition: service_healthy

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  mysql_data: