services:
  mysql:
    image: mysql:8.0
    container_name: reputation_mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    image: ${ECR_REGISTRY:?ECR_REGISTRY is required}/reviewgrow-app-app:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: reputation_app
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads

    ports:
      - "5000:5000"

    depends_on:
      mysql:
        condition: service_healthy

  worker:
    image: ${ECR_REGISTRY:?ECR_REGISTRY is required}/reviewgrow-app-app:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: reputation_worker
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads

    command: ["python", "worker.py"]

    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: